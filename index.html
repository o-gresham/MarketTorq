<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarketTorq</title>
<link rel="icon" type="image/png" href="markettorq.png">
<style>
  body {
    font-family: Arial, sans-serif;
    background: #121212;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    flex-direction: column;
  }
  input[type="text"] {
    padding: 10px;
    width: 300px;
    margin-bottom: 20px;
    border-radius: 5px;
    border: none;
    font-size: 16px;
  }
  table {
    border-collapse: collapse;
    width: 95%;
    max-width: 1200px;
    background: #1e1e1e;
    border-radius: 10px;
    overflow: hidden;
  }
  th, td {
    padding: 12px 15px;
    text-align: left;
  }
  th {
    background: #333;
    font-size: 16px;
  }
  tr:nth-child(even) {
    background: #2a2a2a;
  }
  .rising { color: #00ff7f; }
  .falling { color: #ff4c4c; }
  .equal { color: #ffff00; }

  .ad-spot {
    margin: 20px 0;
    width: 100%;
    text-align: center;
    padding: 20px;
    background: #2a2a2a;
    border-radius: 10px;
  }

  .support-button {
    margin: 20px 0;
    padding: 12px 24px;
    background: #ff5a5f;
    color: #fff;
    text-decoration: none;
    border-radius: 8px;
    font-weight: bold;
  }
</style>
</head>
<body>

<h1>Car Prices</h1>

<!-- Search box -->
<input type="text" id="searchInput" placeholder="Search for a car...">

<!-- Ad spot -->
<div class="ad-spot">
  <!-- Put your AdSense code here later -->
  Ad Spot
</div>

<!-- Table -->
<table id="carTable">
  <thead>
    <tr>
      <th>Car Name</th>
      <th>Value</th>
      <th>Trend</th>
    </tr>
  </thead>
  <tbody>
    <!-- Data will be loaded here -->
  </tbody>
</table>

<!-- Support button -->
<a href="https://ko-fi.com/YOURUSERNAME" target="_blank" class="support-button">Support the Site ❤️</a>

<script>
// Google Sheet CSV URL
const sheetUrl = "YOUR_CSV_URL_HERE";

// Convert CSV to array
function csvToArray(str) {
  const rows = str.trim().split("\n");
  return rows.map(row => row.split(","));
}

// Load data from Google Sheet
fetch(sheetUrl)
  .then(res => res.text())
  .then(csv => {
    const data = csvToArray(csv);
    const tbody = document.querySelector("#carTable tbody");
    data.forEach((row, i) => {
      if (i === 0) return; // Skip header row
      const tr = document.createElement("tr");
      const trendClass = row[2].toLowerCase().includes("rising") ? "rising" : 
                         row[2].toLowerCase().includes("falling") ? "falling" : "equal";
      tr.innerHTML = `<td>${row[0]}</td><td>${row[1]}</td><td class="${trendClass}">${row[2]}</td>`;
      tbody.appendChild(tr);
    });
  });

// Search function
const searchInput = document.getElementById("searchInput");
const tableBody = document.getElementById("carTable").getElementsByTagName('tbody')[0];
searchInput.addEventListener("keyup", function() {
  const filter = this.value.toLowerCase();
  const rows = tableBody.getElementsByTagName("tr");
  for (let i = 0; i < rows.length; i++) {
    const td = rows[i].getElementsByTagName("td")[0];
    rows[i].style.display = td.textContent.toLowerCase().includes(filter) ? "" : "none";
  }
});
</script>

</body>
</html>
